spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:h2:file:./data/notificationdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

notification:
  delivery:
    # 定时投递间隔（毫秒）
    poll-interval-ms: 5000
    # 单次最多取出条数
    batch-size: 20
    # 最大重试次数
    max-retries: 5
    # HTTP 请求超时（秒）
    connect-timeout-seconds: 10
    read-timeout-seconds: 30

logging:
  level:
    com.rightcapital.notification: DEBUG
    org.flywaydb: INFO
